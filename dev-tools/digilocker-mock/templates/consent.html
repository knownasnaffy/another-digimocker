<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiLocker Mock — Consent</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      padding: 2rem 2.5rem;
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 1.4rem;
      color: #1a202c;
      margin-bottom: 0.25rem;
    }
    .badge {
      display: inline-block;
      background: #ebf8ff;
      color: #2b6cb0;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.5rem;
    }
    select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      background: #fff;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
    }
    button {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
    }
    .btn-authorize {
      background: #3182ce;
      color: white;
    }
    .btn-authorize:hover { background: #2b6cb0; }
    .btn-deny {
      background: #e2e8f0;
      color: #4a5568;
    }
    .btn-deny:hover { background: #cbd5e0; }
    .meta {
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DigiLocker Mock — Development</h1>
    <span class="badge">Mock Environment</span>

    <p class="meta">
      <strong>Client:</strong> {{ client_id }}
    </p>

    <form method="POST" action="/public/oauth2/1/authorize/callback">
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}" />
      <input type="hidden" name="state" value="{{ state }}" />
      <input type="hidden" name="code_challenge" value="{{ code_challenge }}" />

      <label for="persona">Select test persona</label>
      <select id="persona" name="persona_id" required>
        {% for p in personas %}
        <option value="{{ p.id }}">{{ p.label }}</option>
        {% endfor %}
      </select>

      <div class="actions">
        <button type="submit" name="action" value="authorize" class="btn-authorize">Authorize</button>
        <button type="submit" name="action" value="deny" class="btn-deny">Deny</button>
      </div>
    </form>
  </div>
</body>
</html>
